<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職務定義書 理解度クイズ / Bài kiểm tra hiểu biết｜T&T Design R&D team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#14213D;
    --navy-2:#1F2E52;
    --slate:#5B6478;
    --slate-light:#8890A0;
    --amber:#C68A2E;
    --amber-light:#E9C888;
    --green:#2F7D5C;
    --green-bg:#E7F3EC;
    --red:#B3452F;
    --red-bg:#FBEAE5;
    --bg:#F3F1EC;
    --paper:#FFFFFF;
    --line:#E1DFD7;
    --line-strong:#C9C6BA;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(20,33,61,0.05), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(198,138,46,0.06), transparent 45%);
    font-family:'Inter', sans-serif;
    color:var(--navy);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:40px 16px 64px;
    line-height:1.6;
  }

  .doc{
    width:100%;
    max-width:720px;
  }

  .letterhead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-bottom:18px;
    margin-bottom:28px;
    border-bottom:2px solid var(--navy);
    gap:12px;
    flex-wrap:wrap;
  }
  .letterhead .mark{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    color:var(--slate);
    text-transform:uppercase;
  }
  .letterhead-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .letterhead .rev{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--slate-light);
    border:1px solid var(--line-strong);
    padding:3px 8px;
    border-radius:3px;
  }

  .lang-toggle{
    display:flex;
    border:1px solid var(--navy);
    border-radius:20px;
    overflow:hidden;
  }
  .lang-toggle button{
    font-family:'Inter', sans-serif;
    font-size:12px;
    font-weight:600;
    padding:6px 14px;
    border:none;
    background:#fff;
    color:var(--navy);
    cursor:pointer;
  }
  .lang-toggle button.active{
    background:var(--navy);
    color:#fff;
  }

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow:0 1px 2px rgba(20,33,61,0.04), 0 12px 32px -20px rgba(20,33,61,0.25);
    padding:44px 40px;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:4px;
    background:linear-gradient(180deg, var(--navy), var(--amber));
  }

  h1{
    font-family:'Zilla Slab', serif;
    font-weight:700;
    font-size:26px;
    margin:0 0 6px;
    color:var(--navy);
    letter-spacing:0.01em;
  }
  .subtitle{
    font-size:14px;
    color:var(--slate);
    margin:0 0 28px;
  }

  label.field-label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
    margin-bottom:8px;
  }

  input[type="text"]{
    width:100%;
    padding:12px 14px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    border:1px solid var(--line-strong);
    border-radius:3px;
    background:#FCFBF9;
    color:var(--navy);
    margin-bottom:24px;
  }
  input[type="text"]:focus{
    outline:2px solid var(--amber);
    outline-offset:1px;
    border-color:var(--amber);
  }

  .role-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:28px;
  }
  @media (max-width:520px){ .role-grid{grid-template-columns:1fr;} }

  .role-option{
    border:1px solid var(--line-strong);
    border-radius:3px;
    padding:12px 14px;
    cursor:pointer;
    background:#FCFBF9;
    transition:border-color .15s, background .15s;
    position:relative;
  }
  .role-option input{position:absolute; opacity:0; pointer-events:none;}
  .role-option .r-name{
    font-weight:600;
    font-size:14px;
    color:var(--navy);
  }
  .role-option .r-desc{
    font-size:12px;
    color:var(--slate);
    margin-top:2px;
  }
  .role-option.selected{
    border-color:var(--navy);
    background:#EFF1F6;
  }
  .role-option.selected::after{
    content:"✓";
    position:absolute;
    top:10px; right:12px;
    color:var(--navy);
    font-weight:700;
  }

  button.primary{
    width:100%;
    padding:14px 18px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    color:#fff;
    background:var(--navy);
    border:none;
    border-radius:3px;
    cursor:pointer;
    letter-spacing:0.01em;
    transition:background .15s;
  }
  button.primary:hover:not(:disabled){background:var(--navy-2);}
  button.primary:disabled{background:var(--slate-light); cursor:not-allowed;}

  button.secondary{
    width:100%;
    padding:12px 18px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--navy);
    background:transparent;
    border:1px solid var(--navy);
    border-radius:3px;
    cursor:pointer;
    margin-top:10px;
  }
  button.secondary:hover{background:#EFF1F6;}

  .error-msg{
    font-size:13px;
    color:var(--red);
    margin:-16px 0 20px;
    display:none;
  }

  /* Quiz screen */
  .progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .progress-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--slate);
  }
  .progress-track{
    height:6px;
    background:var(--line);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:28px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--navy), var(--amber));
    border-radius:3px;
    transition:width .3s ease;
  }

  .tag{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--amber);
    border:1px solid var(--amber-light);
    background:#FCF6EA;
    padding:3px 9px;
    border-radius:2px;
    margin-bottom:14px;
  }

  .question-text{
    font-family:'Zilla Slab', serif;
    font-size:19px;
    font-weight:600;
    color:var(--navy);
    margin:0 0 20px;
    line-height:1.55;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:26px;
  }
  .option{
    border:1px solid var(--line-strong);
    border-radius:3px;
    padding:13px 16px;
    cursor:pointer;
    background:#FCFBF9;
    font-size:14.5px;
    color:var(--navy);
    display:flex;
    align-items:flex-start;
    gap:10px;
    transition:border-color .15s, background .15s;
  }
  .option:hover{border-color:var(--slate-light);}
  .option .letter{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--slate);
    flex-shrink:0;
  }
  .option.selected{
    border-color:var(--navy);
    background:#EFF1F6;
  }
  .option.selected .letter{color:var(--navy);}

  /* Result screen */
  .score-block{
    text-align:center;
    padding:20px 0 30px;
    border-bottom:1px solid var(--line);
    margin-bottom:26px;
  }
  .score-number{
    font-family:'Zilla Slab', serif;
    font-size:56px;
    font-weight:700;
    color:var(--navy);
    line-height:1;
  }
  .score-number span{font-size:26px; color:var(--slate);}
  .score-caption{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--slate);
    margin-top:8px;
  }
  .score-tier{
    display:inline-block;
    margin-top:14px;
    padding:6px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
  }
  .tier-pass{background:var(--green-bg); color:var(--green);}
  .tier-review{background:var(--red-bg); color:var(--red);}

  .review-item{
    border:1px solid var(--line);
    border-radius:3px;
    padding:16px 18px;
    margin-bottom:12px;
  }
  .review-item .rq{
    font-size:14px;
    font-weight:600;
    color:var(--navy);
    margin-bottom:8px;
  }
  .review-row{
    font-size:13px;
    display:flex;
    gap:8px;
    margin-bottom:4px;
  }
  .review-row .rl{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--slate);
    min-width:80px;
    padding-top:1px;
  }
  .badge-correct{color:var(--green); font-weight:600;}
  .badge-wrong{color:var(--red); font-weight:600;}

  .actions-row{
    display:flex;
    gap:10px;
    margin-top:28px;
  }
  .actions-row button{flex:1; margin-top:0;}

  .save-status{
    margin-top:16px;
    padding:12px 16px;
    border-radius:3px;
    font-size:13.5px;
    font-weight:600;
    display:none;
  }
  .save-status.ok{
    background:var(--green-bg);
    color:var(--green);
    display:block;
  }
  .save-status.saving{
    background:#EFF1F6;
    color:var(--navy);
    display:block;
  }

  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="doc">
  <div class="letterhead">
    <span class="mark" id="lh-mark">T&amp;T Design R&amp;D Team — 職務定義書</span>
    <div class="letterhead-right">
      <span class="rev" id="lh-rev">Ver.1.2 準拠</span>
      <div class="lang-toggle">
        <button type="button" id="lang-ja" class="active">日本語</button>
        <button type="button" id="lang-vi">Tiếng Việt</button>

    </div>
  </div>

  <div class="card">

    <!-- SCREEN 1: START -->
    <div id="screen-start">
      <h1 id="txt-title"></h1>
      <p class="subtitle" id="txt-subtitle"></p>

      <label class="field-label" id="txt-name-label" for="input-name"></label>

      <label class="field-label" id="txt-role-label"></label>

      <div class="error-msg" id="error-role"></div>

      <button class="primary" id="btn-start"></button>
    </div>

    <!-- SCREEN 2: QUIZ -->
    <div id="screen-quiz" class="hidden">
      <div class="progress-row">
        <span class="progress-label" id="progress-label">Q1 / 8</span>
        <span class="progress-label" id="progress-role"></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

      <div class="tag" id="q-tag">カテゴリ</div>
      <p class="question-text" id="q-text"></p>
      <div class="options" id="q-options"></div>

      <button class="primary" id="btn-next" disabled></button>
    </div>

    <!-- SCREEN 3: RESULT -->
    <div id="screen-result" class="hidden">
      <h1 id="txt-result-title"></h1>
      <div class="score-block">
        <div class="score-number" id="score-number">0<span>/8</span></div>
        <div class="score-caption" id="score-percent"></div>
        <div id="score-tier"></div>

      <div id="review-list"></div>

      <div class="actions-row">
        <button class="secondary" id="btn-retry"></button>
        <button class="primary" id="btn-save"></button>
      </div>
      <div class="save-status" id="save-status"></div>
    </div>

  </div>
</div>

<script>
/* ============================================================
   設定：結果を自動保存するGoogleフォーム
   ============================================================ */
const GOOGLE_FORM_ID = "1FAIpQLScF2IydX88rKT9TxAb9qTY4__BlSNVHySxiwoPV_eRhtZ3B4w";
const GOOGLE_FORM_RESPONSE_URL = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
const FORM_ENTRY = {
  name:    "entry.1497023593",
  role:    "entry.331292099",
  score:   "entry.1676246864",
  percent: "entry.1969723381",
  datetime:"entry.970210513",
  detail:  "entry.904645516"
};

function submitToGoogleForm(fields) {
  const formData = new URLSearchParams();
  formData.append(FORM_ENTRY.name, fields.name);
  formData.append(FORM_ENTRY.role, fields.role);
  formData.append(FORM_ENTRY.score, fields.score);
  formData.append(FORM_ENTRY.percent, fields.percent);
  formData.append(FORM_ENTRY.datetime, fields.datetime);
  formData.append(FORM_ENTRY.detail, fields.detail);

  return fetch(GOOGLE_FORM_RESPONSE_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: formData.toString()
  });
}

/* ============================================================
   静的テキストの適用
   ============================================================ */
function applyStaticText() {
  const t = UI[currentLang];
  document.getElementById('lh-mark').textContent = t.mark;
  document.getElementById('lh-rev').textContent = t.rev;
  document.getElementById('txt-title').textContent = t.title;
  document.getElementById('txt-subtitle').textContent = t.subtitle;
  document.getElementById('txt-name-label').textContent = t.nameLabel;
  inputName.placeholder = t.namePlaceholder;
  errorName.textContent = t.errorName;
  document.getElementById('txt-role-label').textContent = t.roleLabel;
  errorRole.textContent = t.errorRole;
  btnStart.textContent = t.btnStart;

  document.getElementById('txt-result-title').textContent = t.resultTitle;
  btnRetry.textContent = t.btnRetry;
  btnSave.textContent = t.btnSave;

  langJaBtn.classList.toggle('active', currentLang === 'ja');
  langViBtn.classList.toggle('active', currentLang === 'vi');
}

function setLang(lang) {
  currentLang = lang;
  applyStaticText();
  buildRoleGrid();
  if (!screenQuiz.classList.contains('hidden') && state.roleKey) {
    progressRole.textContent = currentLang === 'ja' ? QUIZ_DATA[state.roleKey].label : QUIZ_DATA[state.roleKey].label_vi;
    renderQuestion();
  }
  if (!screenResult.classList.contains('hidden')) {
    showResult();
  }
}

langJaBtn.addEventListener('click', () => setLang('ja'));
langViBtn.addEventListener('click', () => setLang('vi'));

/* ============================================================
   ロール選択カードの生成
   ============================================================ */
function buildRoleGrid() {
  roleGrid.innerHTML = '';
  Object.keys(QUIZ_DATA).forEach(key => {
    const role = QUIZ_DATA[key];
    const div = document.createElement('label');
    div.className = 'role-option' + (state.roleKey === key ? ' selected' : '');
    div.dataset.key = key;
    const label = currentLang === 'ja' ? role.label : role.label_vi;
    const desc = currentLang === 'ja' ? role.desc : role.desc_vi;
    div.innerHTML = `
      <input type="radio" name="role" value="${key}">
      <div class="r-name">${label}</div>
      <div class="r-desc">${desc}</div>
    `;
    div.addEventListener('click', () => {
      document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      state.roleKey = key;
      errorRole.style.display = 'none';
    });
    roleGrid.appendChild(div);
  });
}

/* ============================================================
   開始ボタン
   ============================================================ */
btnStart.addEventListener('click', () => {
  const name = inputName.value.trim();
  let ok = true;
  if (!name) { errorName.style.display = 'block'; ok = false; } else { errorName.style.display = 'none'; }
  if (!state.roleKey) { errorRole.style.display = 'block'; ok = false; }
  if (!ok) return;

  state.name = name;
  state.index = 0;
  state.answers = [];
  state.formSubmitted = false;

  screenStart.classList.add('hidden');
  screenQuiz.classList.remove('hidden');
  progressRole.textContent = currentLang === 'ja' ? QUIZ_DATA[state.roleKey].label : QUIZ_DATA[state.roleKey].label_vi;
  renderQuestion();
});

/* ============================================================
   設問レンダリング
   ============================================================ */
let selectedOption = null;

function renderQuestion() {
  selectedOption = null;
  btnNext.disabled = true;

  const t = UI[currentLang];
  const role = QUIZ_DATA[state.roleKey];
  const total = role.questions.length;
  const q = role.questions[state.index];

  progressLabel.textContent = t.progress(state.index + 1, total);
  progressFill.style.width = `${(state.index / total) * 100}%`;

  qTag.textContent = currentLang === 'ja' ? q.cat : q.cat_vi;
  qText.textContent = currentLang === 'ja' ? q.q : q.q_vi;
  qOptions.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  const opts = currentLang === 'ja' ? q.options : q.options_vi;
  opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    div.addEventListener('click', () => {
      document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      selectedOption = i;
      btnNext.disabled = false;
    });
    qOptions.appendChild(div);
  });

  btnNext.textContent = (state.index === total - 1) ? t.seeResult : t.next;
}

btnNext.addEventListener('click', () => {
  const role = QUIZ_DATA[state.roleKey];
  const q = role.questions[state.index];
  state.answers.push({
    selected: selectedOption,
    correctIndex: q.correct,
    isCorrect: selectedOption === q.correct
  });

  if (state.index < role.questions.length - 1) {
    state.index += 1;
    renderQuestion();
  } else {
    progressFill.style.width = '100%';
    showResult();
  }
});

/* ============================================================
   結果画面
   ============================================================ */
function showResult() {
  screenQuiz.classList.add('hidden');
  screenResult.classList.remove('hidden');
  saveStatus.className = 'save-status';
  saveStatus.textContent = '';

  const t = UI[currentLang];
  const role = QUIZ_DATA[state.roleKey];
  const total = role.questions.length;
  const correctCount = state.answers.filter(a => a.isCorrect).length;
  const percent = Math.round((correctCount / total) * 100);

  scoreNumber.innerHTML = `${correctCount}<span>/${total}</span>`;
  scorePercent.textContent = t.percentLabel(percent);

  scoreTier.innerHTML = '';
  const tierSpan = document.createElement('span');
  tierSpan.className = 'score-tier ' + (percent >= 75 ? 'tier-pass' : 'tier-review');
  tierSpan.textContent = percent >= 75 ? t.tierPass : t.tierReview;
  scoreTier.appendChild(tierSpan);

  const letters = ['A', 'B', 'C', 'D'];
  reviewList.innerHTML = '';
  role.questions.forEach((q, i) => {
    const a = state.answers[i];
    const qLabel = currentLang === 'ja' ? q.q : q.q_vi;
    const opts = currentLang === 'ja' ? q.options : q.options_vi;
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <div class="rq">Q${i + 1}. ${qLabel}</div>
      <div class="review-row"><span class="rl">${t.answerLabel}</span><span class="${a.isCorrect ? 'badge-correct' : 'badge-wrong'}">${letters[a.selected]}. ${opts[a.selected]}　${a.isCorrect ? t.correctTag : t.wrongTag}</span></div>
      ${a.isCorrect ? '' : `<div class="review-row"><span class="rl">${t.correctLabel}</span><span class="badge-correct">${letters[q.correct]}. ${opts[q.correct]}</span></div>`}
    `;
    reviewList.appendChild(div);
  });
}

/* ============================================================
   もう一度受験
   ============================================================ */
btnRetry.addEventListener('click', () => {
  state = { name: state.name, roleKey: null, index: 0, answers: [], formSubmitted: false };
  screenResult.classList.add('hidden');
  screenStart.classList.remove('hidden');
  buildRoleGrid();
});

/* ============================================================
   結果を保存
   ============================================================ */
function buildFormFields() {
  const role = QUIZ_DATA[state.roleKey];
  const roleLabel = currentLang === 'ja' ? role.label : role.label_vi;
  const total = role.questions.length;
  const correctCount = state.answers.filter(a => a.isCorrect).length;
  const percent = Math.round((correctCount / total) * 100);
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const letters = ['A', 'B', 'C', 'D'];
  let detail = '';
  role.questions.forEach((q, i) => {
    const a = state.answers[i];
    const cat = currentLang === 'ja' ? q.cat : q.cat_vi;
    const line = currentLang === 'ja'
      ? `Q${i + 1}（${cat}）: ${a.isCorrect ? '正解' : '不正解'}${a.isCorrect ? '' : `　※回答:${letters[a.selected]} 正解:${letters[q.correct]}`}`
      : `Câu ${i + 1} (${cat}): ${a.isCorrect ? 'Đúng' : 'Sai'}${a.isCorrect ? '' : `　*Bạn chọn: ${letters[a.selected]} - Đáp án đúng: ${letters[q.correct]}`}`;
    detail += line + '\n';
  });

  return {
    name: state.name,
    role: roleLabel,
    score: `${correctCount}/${total}`,
    percent: `${percent}%`,
    datetime: dateStr,
    detail: detail.trim()
  };
}

btnSave.addEventListener('click', () => {
  if (state.formSubmitted) return;

  const t = UI[currentLang];
  saveStatus.className = 'save-status saving';
  saveStatus.textContent = t.saving;
  btnSave.disabled = true;

  const fields = buildFormFields();
  submitToGoogleForm(fields)
    .catch(() => {})
    .finally(() => {
      state.formSubmitted = true;
      saveStatus.className = 'save-status ok';
      saveStatus.textContent = t.saved;
      btnSave.disabled = false;
    });
});

/* ============================================================
   初期化
   ============================================================ */
applyStaticText();
buildRoleGrid();
</script>
</body>
</html>
